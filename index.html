<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Productivity Tools</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1115;
  color: #e8e8e8;
}

header {
  padding: 30px;
  text-align: center;
  background: #151922;
  border-bottom: 1px solid #2a2f3a;
}

header h1 {
  margin: 0;
  color: #4aa3ff;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}

.section-title {
  margin-top: 40px;
  margin-bottom: 15px;
  color: #9fb7d9;
  text-transform: uppercase;
  font-size: 14px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  display: block;
  width: 260px;
  padding: 20px;
  background: #1b2130;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  border: 1px solid #2a2f3a;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  background: #2f80ed;
}

.icon {
  font-size: 30px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <h1>Mario Productivity Tools</h1>
</header>

<div class="container">

  <div class="section-title">Your Tools</div>
  <div class="grid">

    <a class="card" href="case-notes-tool/">
      <div class="icon">📝</div>
      <h2>Case Note Generator</h2>
    </a>

    <a class="card" href="client-dashboard-tool/">
      <div class="icon">📊</div>
      <h2>Client Dashboard</h2>
    </a>

    <a class="card" href="monthly-report-tool/">
      <div class="icon">📄</div>
      <h2>Monthly Report</h2>
    </a>

    <a class="card" href="chore-planner/">
      <div class="icon">🧹</div>
      <h2>Chore Planner</h2>
    </a>

    <a class="card" href="Biblestudy-tool/">
      <div class="icon">📖</div>
      <h2>Bible Study</h2>
    </a>

    <a class="card" href="nvti-guide/">
      <div class="icon">✈️</div>
      <h2>NVTI Guide</h2>
    </a>

  </div>

</div>

</body>
</html>
